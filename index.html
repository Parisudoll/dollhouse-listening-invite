<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dollhouse Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f6d4dc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* SOBRE */
.envelope {
  position: relative;
  width: 320px;
  height: 220px;
  background: linear-gradient(145deg, #f8b9c9, #f2a7bb);
  border-radius: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  cursor: pointer;
  animation: heartbeat 2.5s infinite;
}

.envelope::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
  background-size: 4px 4px;
  opacity: 0.4;
}

@keyframes heartbeat {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

/* tapa */
.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 160px solid transparent;
  border-right: 160px solid transparent;
  border-bottom: 110px solid #f2a7bb;
  top: -110px;
  transform-origin: top;
  transition: 0.7s;
}

/* carta */
.letter {
  position: absolute;
  width: 280px;
  height: 380px;
  background: #fffaf5;
  top: 20px;
  left: 20px;
  padding: 25px;
  box-sizing: border-box;
  border-radius: 12px;
  transform: translateY(0);
  transition: 0.9s;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  opacity: 0;
  overflow-y: auto;
}

.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-270px);
  opacity: 1;
}

/* texto */
.title {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
  margin-bottom: 10px;
}

.text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  line-height: 1.7;
  white-space: pre-line;
}

/* LINK ROSADO 💗 */
.link {
  color: #e75480;
  text-decoration: underline;
}

/* corazones */
.heart {
  position: absolute;
  color: rgba(255,105,180,0.5);
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-250px); opacity: 0; }
}

/* logo */
.logo {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 45px;
  opacity: 0.85;
}

</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()" id="env">

  <div class="flap"></div>

  <img src="LOGO.png" class="logo">

  <div class="letter">
    <div class="title">Dollhouse</div>
    <div class="text" id="typeText"></div>
  </div>

</div>

<!-- sonidos -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-soft-click-1124.mp3"></audio>
<audio id="paperSound" src="https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3"></audio>

<script>

let i = 0;

const message = `Hey! Esto no es para todos… y por eso estás aquí.

Dollhouse tiene su propio espacio, íntimo y real, y quiero que lo vivás conmigo antes que nadie.

Un listening party solo para gente especial.

¿Entrás? 🖤

Lugar: Mina Experts
Hora: 7:00pm
Dresscode: pink, black and white`;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("typeText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 20);
  } else {
    // reemplazar Mina Experts por link
    document.getElementById("typeText").innerHTML =
      document.getElementById("typeText").innerHTML.replace(
        "Mina Experts",
        `<a href="https://share.google/NGYAW77vSPZf8va6e" target="_blank" class="link">Mina Experts</a>`
      );
  }
}

function openEnvelope() {
  const click = document.getElementById("clickSound");
  const paper = document.getElementById("paperSound");

  click.currentTime = 0;
  paper.currentTime = 0;

  click.play().catch(()=>{});
  paper.play().catch(()=>{});

  document.getElementById("env").classList.toggle("open");

  createHearts();

  setTimeout(typeWriter, 700);
}

function createHearts() {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*window.innerWidth + "px";
    heart.style.top = "100%";
    heart.style.fontSize = (12 + Math.random()*18) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),5000);
  }
}

</script>

</body>
</html>
