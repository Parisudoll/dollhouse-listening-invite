<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dollhouse Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f6d4dc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* SOBRE */
.envelope {
  position: relative;
  width: 340px;
  height: 240px;
  background: linear-gradient(145deg, #f8b9c9, #f2a7bb);
  border-radius: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  cursor: pointer;
  animation: heartbeat 2.5s infinite;
}

@keyframes heartbeat {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

/* TAPA */
.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 170px solid transparent;
  border-right: 170px solid transparent;
  border-bottom: 120px solid #f2a7bb;
  top: -120px;
  transform-origin: top;
  transition: 0.7s;
}

/* CARTA */
.letter {
  position: absolute;
  width: 300px;
  background: #fffaf5;
  top: 20px;
  left: 20px;
  padding: 25px;
  box-sizing: border-box;
  border-radius: 12px;
  transform: translateY(0);
  transition: 0.9s;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  opacity: 0;
}

.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-250px);
  opacity: 1;
}

/* TEXTO */
.title {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
  margin-bottom: 10px;
}

.text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  line-height: 1.8;
  white-space: pre-line;
}

/* LINK */
.link {
  color: #e75480;
  text-decoration: underline;
}

/* LOGO */
.logo {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 45px;
  opacity: 0.85;
}

</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()" id="env">

  <div class="flap"></div>

  <img src="LOGO.png" class="logo">

  <div class="letter">
    <div class="title">Dollhouse</div>
    <div class="text" id="typeText"></div>
  </div>

</div>

<!-- sonidos -->
<audio id="clickSound" preload="auto">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-soft-click-1124.mp3">
</audio>

<audio id="paperSound" preload="auto">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3">
</audio>

<!-- MUSICA COZY -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>

const fullText = `Hey! Esto no es para todos… y por eso estás aquí.

Dollhouse tiene su propio espacio, íntimo y real, y quiero que lo vivás conmigo antes que nadie.

Un listening party solo para gente especial.

¿Entrás? 🖤

Lugar: Mina Experts
Hora: 7:00pm
Dresscode: pink, black and white`;

let i = 0;
let started = false;

function typeWriter() {
  if (i < fullText.length) {
    document.getElementById("typeText").innerHTML += fullText.charAt(i);
    i++;
    setTimeout(typeWriter, 18);
  } else {
    document.getElementById("typeText").innerHTML =
      document.getElementById("typeText").innerHTML.replace(
        "Mina Experts",
        `<a href="https://share.google/NGYAW77vSPZf8va6e" target="_blank" class="link">Mina Experts</a>`
      );
  }
}

function openEnvelope() {

  if (started) return;
  started = true;

  const click = document.getElementById("clickSound");
  const paper = document.getElementById("paperSound");
  const music = document.getElementById("bgMusic");

  click.play();
  setTimeout(()=>paper.play(), 150);

  // música suave
  music.volume = 0.2;
  music.play();

  document.getElementById("env").classList.add("open");

  setTimeout(typeWriter, 600);
}

</script>

</body>
</html>
