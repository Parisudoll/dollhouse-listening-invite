<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dollhouse Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #f6d4dc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.envelope {
  position: relative;
  width: 340px;
  height: 240px;
  background: linear-gradient(145deg, #f8b9c9, #f2a7bb);
  border-radius: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  cursor: pointer;
  animation: heartbeat 2.5s infinite;
}

@keyframes heartbeat {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 170px solid transparent;
  border-right: 170px solid transparent;
  border-bottom: 120px solid #f2a7bb;
  top: -120px;
  transform-origin: top;
  transition: 0.7s;
}

.letter {
  position: absolute;
  width: 300px;
  background: #fffaf5;
  top: 20px;
  left: 20px;
  padding: 25px;
  border-radius: 12px;
  transform: translateY(0);
  transition: 0.9s;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  opacity: 0;
}

.open .flap { transform: rotateX(180deg); }
.open .letter {
  transform: translateY(-250px);
  opacity: 1;
}

.title {
  font-family: 'Great Vibes', cursive;
  font-size: 36px;
}

.text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  line-height: 1.8;
  white-space: pre-line;
}

.link {
  color: #e75480;
  text-decoration: underline;
}

.logo {
  position: absolute;
  bottom: 8px;
  right: 8px;
  width: 110px; /* MÁS GRANDE */
}

/* partículas */
.heart, .bear, .sparkle { position:absolute; }
.heart { color: rgba(255,105,180,0.7); }
.bear { font-size:20px; }
.sparkle { color:white; }

</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()" id="env">
  <div class="flap"></div>
  <img src="LOGO.png" class="logo">

  <div class="letter">
    <div class="title">Dollhouse</div>
    <div class="text" id="typeText"></div>
    <div id="extraContent"></div>
  </div>
</div>

<audio id="clickSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-soft-click-1124.mp3">
</audio>

<audio id="paperSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3">
</audio>

<audio id="bgMusic" loop>
  <source src="music.mp3">
</audio>

<script>

let started = false;

const text = `Hey! Esto no es para todos… y por eso estás aquí.

Dollhouse tiene su propio espacio, íntimo y real, y queremos que lo vivás con nosotras antes que nadie.

Un listening party solo para gente especial.

¿Entrás? 🖤

confirma asistencia para recibir coordenadas`;

let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typeText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 18);
  } else {
    showExtra();
  }
}

function showExtra() {
  document.getElementById("extraContent").innerHTML = `
    <br>
    <a href="https://forms.gle/C4294wdLDyoJmyNP6" target="_blank" class="link">
      Confirma asistencia
    </a>
    <br><br>
    Viernes 20 marzo
    Hora: 6:00pm<br>
    Prepara tu mejor Pijama
  `;
}

function openEnvelope() {

  if (started) return;
  started = true;

  document.getElementById("clickSound").play();
  setTimeout(()=>document.getElementById("paperSound").play(),150);

  let music = document.getElementById("bgMusic");
  music.volume = 0.2;
  music.play();

  document.getElementById("env").classList.add("open");

  startParticles();

  setTimeout(typeWriter, 600);
}

/* partículas */
function startParticles() {
  setInterval(() => {

    let el = document.createElement("div");
    let r = Math.random();

    if (r < 0.4) { el.className="heart"; el.innerHTML="❤"; }
    else if (r < 0.8) { el.className="bear"; el.innerHTML="🧸"; }
    else { el.className="sparkle"; el.innerHTML="✦"; }

    el.style.left = Math.random()*window.innerWidth+"px";
    el.style.top = "100%";

    document.body.appendChild(el);

    el.animate([
      {transform:"translateY(0)",opacity:1},
      {transform:"translateY(-300px)",opacity:0}
    ],{duration:6000});

    setTimeout(()=>el.remove(),6000);

  },300);
}

/* glitter */
document.addEventListener("click", e=>spark(e.clientX,e.clientY));
document.addEventListener("touchstart", e=>{
  let t=e.touches[0]; spark(t.clientX,t.clientY);
});

function spark(x,y){
  for(let i=0;i<10;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.innerHTML="✦";
    s.style.left=x+"px";
    s.style.top=y+"px";
    document.body.appendChild(s);

    let a=Math.random()*2*Math.PI;
    let d=30+Math.random()*40;

    s.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`,opacity:0}
    ],{duration:600});

    setTimeout(()=>s.remove(),600);
  }
}

</script>

</body>
</html>
